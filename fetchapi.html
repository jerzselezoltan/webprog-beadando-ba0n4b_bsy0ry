<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Település CRUD - Fetch API</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Fetch API CRUD</h1>
    </header>

  
   <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <div class="collapse navbar-collapse justify-content-center">
                <ul class="navbar-nav">
                    <h4 class="nav-item"><a class="nav-link" href="index.html">Vissza a főoldalra</a></h4>
                </ul>
            </div>
        </div>
    </nav>

    <main>
        <div id="app-container">
            <div id="message"></div>
            
            <h2 id="form-title">Új település rögzítése</h2>
            
            <form id="telepulesForm">
                <input type="hidden" id="id">
                <input type="text" id="nev" placeholder="Település neve" required>
                <input type="text" id="megye" placeholder="Megye" required>
                <button type="submit" id="submitBtn">Mentés</button>
            </form>

            <table>
                <thead>
                    <tr>
                        <th>Név</th>
                        <th>Megye</th>
                        <th>Műveletek</th>
                    </tr>
                </thead>
                <tbody id="telepulesTable">
                   
                </tbody>
            </table>
        </div>
    </main>

    <footer>
        <p>Készítők: Horváth Olivér (BSY0RY), Jerzsele Zoltán (BA0N4B)</p>
    </footer>

   
    <script src="fetchapi.js"></script>
</body>
</html>
